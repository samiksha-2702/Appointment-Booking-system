<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
}

/* LEFT PANEL */
.left-panel {
    flex: 1;
    background: linear-gradient(135deg, #1a73e8, #4dabf7);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
}

.logo {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 15px;
}

/* RIGHT PANEL */
.right-panel {
    flex: 1;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FORM */
.form-box {
    width: 380px;
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.form-box h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #1a73e8;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #1a73e8;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #1a73e8;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1557b0;
}

/* LINK */
.register-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #1a73e8;
    text-decoration: none;
}

.register-link:hover {
    text-decoration: underline;
}

/* MOBILE */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    .left-panel {
        height: 35vh;
    }

    .right-panel {
        height: 65vh;
    }
}
</style>
</head>

<body>

<div class="left-panel">
    <h1>AppointPro</h1>
    <p>Welcome back! Manage your appointments easily</p>
</div>

<div class="right-panel">
    <div class="form-box">
        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <a href="{% url 'register' %}" class="register-link">
            Create account
        </a>
    </div>
</div>

</body>
</html>
