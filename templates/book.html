{% extends 'base.html' %}

{% block extra_css %}
<style>
  .booking-wrapper {
    max-width: 560px;
    margin: 100px auto 40px;
    padding: 0 20px;
  }
  .booking-card {
    background: white;
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 10px 40px rgba(26,115,232,0.1);
    border: 1px solid rgba(26,115,232,0.12);
  }
  .booking-header { text-align: center; margin-bottom: 32px; }
  .booking-header .header-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #e8f0fe, #d2e3fc);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .booking-header .header-icon i { font-size: 28px; color: #1a73e8; }
  .booking-header h2 { font-size: 26px; font-weight: 700; color: #202124; margin-bottom: 6px; }
  .booking-header p { color: #5f6368; font-size: 14px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 13px; color: #3c4043;
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .form-group label i { color: #1a73e8; font-size: 14px; }

  .form-control {
    width: 100%; padding: 13px 16px;
    border: 2px solid #e9ecef; border-radius: 12px;
    font-size: 15px; font-family: "Inter", sans-serif;
    color: #202124; background: #fafafa;
    transition: all 0.25s ease; appearance: none;
  }
  .form-control:focus {
    outline: none; border-color: #1a73e8;
    background: white; box-shadow: 0 0 0 4px rgba(26,115,232,0.08);
  }
  .form-control:hover { border-color: #b0c4de; }

  .select-wrapper { position: relative; }
  .select-wrapper::after {
    content: '\f107'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    color: #1a73e8; pointer-events: none; font-size: 14px;
  }

  .submit-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #1a73e8, #1557b0);
    color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.3s ease;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 8px;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,115,232,0.35); }
  .submit-btn:active { transform: translateY(0); }

  .back-link {
    display: block; text-align: center; margin-top: 20px;
    color: #5f6368; font-size: 14px; text-decoration: none;
  }
  .back-link:hover { color: #1a73e8; }

  @media (max-width: 600px) {
    .booking-card { padding: 28px 20px; }
    .booking-wrapper { margin-top: 80px; }
  }
</style>
{% endblock %}

{% block content %}
<div class="booking-wrapper">
  <div class="booking-card">

    <div class="booking-header">
      <div class="header-icon"><i class="fas fa-calendar-plus"></i></div>
      <h2>Book an Appointment</h2>
      <p>Select your doctor, date, and preferred time slot</p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label><i class="fas fa-user-md"></i> Doctor</label>
        <div class="select-wrapper">
          <select name="doctor" class="form-control" required>
            <option value="">— Select a Doctor —</option>
            {% for doctor in doctors %}
              <option value="{{ doctor.id }}"
                {% if selected_doctor and doctor.id == selected_doctor.id %}selected{% endif %}>
                Dr. {{ doctor.name }} — {{ doctor.specialization }}
              </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-calendar-day"></i> Date</label>
        <input type="date" name="date" class="form-control" required min="{{ today }}" />
      </div>

      <div class="form-group">
        <label><i class="fas fa-clock"></i> Time Slot</label>
        <div class="select-wrapper">
          <select name="time" class="form-control" required>
            <option value="">— Select a Time —</option>
            <option value="10:00">10:00 AM</option>
            <option value="11:00">11:00 AM</option>
            <option value="12:00">12:00 PM</option>
            <option value="14:00">02:00 PM</option>
            <option value="15:00">03:00 PM</option>
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn">
        <i class="fas fa-check-circle"></i> Confirm Booking
      </button>
    </form>

    <a href="{% url 'dashboard' %}" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>

  </div>
</div>
{% endblock %}
