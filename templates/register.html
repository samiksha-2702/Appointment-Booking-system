<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
}

/* LEFT SIDE */
.left-panel {
    flex: 1;
    background: linear-gradient(135deg, #1a73e8, #4dabf7);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
}

.logo {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 15px;
}

/* RIGHT SIDE */
.right-panel {
    flex: 1;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FORM CARD */
.form-box {
    background: #ffffff;
    padding: 40px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.form-box h2 {
    color: #1a73e8;
    text-align: center;
    margin-bottom: 25px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
}

input::placeholder {
    color: #999;
}

input:focus {
    outline: none;
    border-color: #1a73e8;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #1a73e8;
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    background: #1557b0;
}

/* LINK */
.login-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #1a73e8;
    font-size: 14px;
    text-decoration: none;
}

.login-link:hover {
    text-decoration: underline;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    .left-panel {
        height: 35vh;
    }

    .right-panel {
        height: 65vh;
    }
}
</style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left-panel">
    <div class="logo">
        Appointment System
    </div>
    <p>Create your account and manage appointments easily</p>
</div>

<!-- RIGHT SIDE -->
<div class="right-panel">
    <div class="form-box">
        <h2>Create Account</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_pass" placeholder="Confirm Password" required>

            <button type="submit">Register</button>
        </form>

        <a href="{% url 'signin' %}" class="login-link">
            Already have an account? Login
        </a>
    </div>
</div>

</body>
</html>
